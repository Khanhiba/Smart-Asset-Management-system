services:
  - type: web
    name: smart-asset-management-api
    runtime: node
    rootDir: server
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: JWT_ISSUER
        value: nexus-assets-api
      - key: JWT_AUDIENCE
        value: nexus-assets-web
      - key: CLIENT_URL
        sync: false
      - key: SEED_DEMO_DATA
        value: true
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
