services:
  - type: web
    name: nexus-assets
    runtime: node
    plan: free
    buildCommand: npm ci && npm ci --prefix server && npm ci --prefix client && npm run build --prefix client
    startCommand: npm start
    initialDeployHook: npm run seed --prefix server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
